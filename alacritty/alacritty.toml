[general]
import = [
    # "./themes/melange-dark.toml"
    "./themes/tokyonight-night.toml"
]

working_directory = "~/dev"
live_config_reload = true

[env]
TERM = 'xterm-256color'

[window]
padding.x = 10
padding.y = 10
dimensions.columns = 110
dimensions.lines = 35

position.x = 100
position.y = 100
decorations = "Buttonless"
opacity = 0.90
blur = true

[font]
normal = { family = "BlexMono Nerd Font Mono" }
size = 15

[colors]
vi_mode_cursor.text = "CellBackground"
vi_mode_cursor.cursor = "CellForeground"

